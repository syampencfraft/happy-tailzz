{% extends 'base.html' %}
{% block content %}

<h3>User Registration</h3>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <input class="form-control mb-2" type="text" name="full_name" placeholder="Full Name" required>
    <input class="form-control mb-2" type="email" name="email" placeholder="Email" required>
    <input class="form-control mb-2" type="text" name="phone" placeholder="Phone" required>
    <textarea class="form-control mb-2" name="address" placeholder="Address" required></textarea>

    <select class="form-control mb-2" name="role" id="role" required>
        <option value="">Select Role</option>
        <option value="owner">Owner</option>
        <option value="seller">Adoption & Seller</option>
        <option value="vet">Veterinarian</option>
        <option value="caretaker">Pet Caretaker</option>
        <option value="groomer">Pet Groomer</option>
    </select>

    <!-- Vet Fields -->
    <div id="vet_fields" style="display:none;">
        <input class="form-control mb-2" type="text" name="qualification" placeholder="Qualification">
        <input class="form-control mb-2" type="text" name="registration_number" placeholder="Registration Number">
    </div>

    <!-- Caretaker / Groomer -->
    <div id="service_fields" style="display:none;">
        <input class="form-control mb-2" type="number" name="experience" placeholder="Experience (years)">
        <textarea class="form-control mb-2" name="services_offered" placeholder="Services Offered"></textarea>
    </div>

    <input class="form-control mb-2" type="file" name="profile_image" required>
    <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

    <button class="btn btn-primary">Register</button>
    <a href="{% url 'login' %}" class="btn btn-link">Login</a>
</form>

<script>
document.getElementById('role').addEventListener('change', function () {
    document.getElementById('vet_fields').style.display =
        this.value === 'vet' ? 'block' : 'none';

    document.getElementById('service_fields').style.display =
        (this.value === 'caretaker' || this.value === 'groomer') ? 'block' : 'none';
});
</script>

{% endblock %}
