{% extends 'base.html' %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 600px;">
        <div class="auth-header text-center mb-4">
            <h2 class="display-6">Create Account</h2>
            <p>Join our premium pet care community</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <div class="input-group-modern">
                        <i class="fas fa-user"></i>
                        <input class="form-control" type="text" name="full_name" placeholder="Full Name" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group-modern">
                        <i class="fas fa-phone"></i>
                        <input class="form-control" type="text" name="phone" placeholder="Phone Number" required>
                    </div>
                </div>
            </div>

            <div class="input-group-modern mb-3">
                <i class="fas fa-envelope"></i>
                <input class="form-control" type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-group-modern mb-3">
                <i class="fas fa-map-marker-alt"></i>
                <textarea class="form-control" name="address" placeholder="Full Address" rows="2"
                    style="height: auto; padding-top: 1rem;" required></textarea>
            </div>

            <div class="input-group-modern mb-3">
                <i class="fas fa-user-tag"></i>
                <select class="form-control" name="role" id="role" required>
                    <option value="" disabled selected>Select Your Role</option>
                    <option value="owner">Pet Owner</option>
                    <option value="vet">Veterinarian</option>
                    <option value="caretaker">Pet Caretaker</option>
                </select>
            </div>

            <!-- Vet Fields -->
            <div id="vet_fields" style="display:none;">
                <div class="input-group-modern mb-3">
                    <i class="fas fa-graduation-cap"></i>
                    <input class="form-control" type="text" name="qualification" placeholder="Qualification">
                </div>
                <div class="input-group-modern mb-3">
                    <i class="fas fa-id-card"></i>
                    <input class="form-control" type="text" name="registration_number"
                        placeholder="Registration Number">
                </div>
            </div>

            <!-- Caretaker Fields -->
            <div id="service_fields" style="display:none;">
                <div class="input-group-modern mb-3">
                    <i class="fas fa-briefcase"></i>
                    <input class="form-control" type="number" name="experience" placeholder="Experience (years)">
                </div>
                <div class="input-group-modern mb-3">
                    <i class="fas fa-concierge-bell"></i>
                    <textarea class="form-control" name="services_offered" placeholder="Services Offered" rows="2"
                        style="height: auto; padding-top: 1rem;"></textarea>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase mb-2 ms-1">Profile Image</label>
                <div class="input-group-modern">
                    <i class="fas fa-image"></i>
                    <input class="form-control" type="file" name="profile_image" required style="padding-top: 0.85rem;">
                </div>
            </div>

            <div class="row g-3 mb-2">
                <div class="col-md-6">
                    <div class="input-group-modern">
                        <i class="fas fa-lock"></i>
                        <input class="form-control" type="password" name="password" id="password" placeholder="Password"
                            required>
                        <button class="password-toggle" type="button" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group-modern">
                        <i class="fas fa-lock"></i>
                        <input class="form-control" type="password" name="confirm_password" id="confirm_password"
                            placeholder="Confirm" required>
                        <button class="password-toggle" type="button"
                            onclick="togglePassword('confirm_password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="password-error" class="alert alert-danger border-0 small py-2 d-none animate-up"></div>

            <button class="btn btn-primary w-100 py-3 rounded-pill shadow-lg mt-3 mb-4" type="submit" id="submitBtn">
                Create Account <i class="fas fa-user-plus ms-2"></i>
            </button>

            <div class="text-center">
                <span class="text-muted">Already have an account?</span>
                <a href="{% url 'login' %}" class="fw-bold text-primary text-decoration-none ms-2">Login here</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Role selection logic with smoother animation
    document.getElementById('role').addEventListener('change', function () {
        const vetFields = document.getElementById('vet_fields');
        const serviceFields = document.getElementById('service_fields');

        vetFields.classList.remove('animate-up');
        serviceFields.classList.remove('animate-up');

        if (this.value === 'vet') {
            vetFields.style.display = 'block';
            vetFields.classList.add('animate-up');
            serviceFields.style.display = 'none';
        } else if (this.value === 'caretaker') {
            serviceFields.style.display = 'block';
            serviceFields.classList.add('animate-up');
            vetFields.style.display = 'none';
        } else {
            vetFields.style.display = 'none';
            serviceFields.style.display = 'none';
        }
    });

    // Form Validation logic
    document.querySelector('form').addEventListener('submit', function (e) {
        let valid = true;
        let errors = [];

        const phone = document.querySelector('input[name="phone"]').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const errorDiv = document.getElementById('password-error');

        // Phone Validation
        if (!/^\d{10}$/.test(phone)) {
            errors.push("Phone number must be exactly 10 digits.");
            valid = false;
        }

        // Password Match Validation
        if (password !== confirmPassword) {
            errors.push("Passwords do not match.");
            valid = false;
        }

        // Password Complexity Validation
        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        if (!passwordRegex.test(password)) {
            errors.push("Password must be 8+ chars, include Uppercase, Lowercase, Number & Special Char.");
            valid = false;
        }

        if (!valid) {
            e.preventDefault();
            errorDiv.innerHTML = errors.join('<br>');
            errorDiv.classList.remove('d-none');

            const card = document.querySelector('.auth-card');
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'shake 0.5s';
        } else {
            errorDiv.classList.add('d-none');
        }
    });

    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

<style>
    .auth-card {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes shake {

        0%,
        100% {
            transform: translateX(0);
        }

        25% {
            transform: translateX(-10px);
        }

        75% {
            transform: translateX(10px);
        }
    }

    input[type="file"]::-webkit-file-upload-button {
        display: none;
    }
</style>

{% endblock %}
