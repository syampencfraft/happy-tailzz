{% extends 'base.html' %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header text-center mb-5">
            <h2 class="display-6">Welcome Back</h2>
            <p>Please enter your details to sign in</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="input-group-modern">
                <i class="fas fa-envelope"></i>
                <input class="form-control" type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-group-modern">
                <i class="fas fa-user-tag"></i>
                <select class="form-control" name="role" required>
                    <option value="" disabled selected>Select Your Role</option>
                    <option value="owner">Pet Owner</option>
                    <option value="vet">Veterinarian</option>
                    <option value="caretaker">Pet Caretaker</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="input-group-modern">
                <i class="fas fa-lock"></i>
                <input class="form-control" type="password" name="password" id="password" placeholder="Password"
                    required>
                <button class="password-toggle" type="button" onclick="togglePassword('password', this)">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label ms-1" for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button class="btn btn-primary w-100 py-3 rounded-pill shadow-lg mb-4">
                Continue to Dashboard <i class="fas fa-arrow-right ms-2"></i>
            </button>

            <div class="text-center">
                <span class="text-muted">Don't have an account?</span>
                <a href="{% url 'register' %}" class="fw-bold text-primary text-decoration-none ms-2">Create Account</a>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

{% endblock %}
